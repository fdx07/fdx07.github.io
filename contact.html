<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faisal Durbaa - Contact</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" src="Faisaldurbaa.png" height="15" width="15">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
</head>
<body>
    <header>
    <nav>
        <div class="logo-title">
            <img src="Faisaldurbaa.png" alt="Logo" class="logo">
            <span class="site-title">Faisal Durbaa</span>
        </div>
        <ul>
            <li><a href="index.html">Blog</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

    <main>
        <h1>Contact Me</h1>
        
        <section class="contact-info">
            <h2>Get in Touch</h2>
            <p>Feel free to reach out to me through any of the following channels:</p>
            <ul>
                <li><i class="fas fa-envelope"></i> Email: <a href="mailto:durbaafaisal@gmail.com">durbaafaisal@gmail.com</a></li>
                <li><i class="fab fa-linkedin"></i> <a href="https://www.linkedin.com/in/faisaldurbaa" target="_blank">LinkedIn </a></li>
                <li><i class="fas fa-globe"></i> <a href="https://faisaldurbaa.blogspot.com" target="_blank">Blogger</a></li>
                <li><i class="fa-x-twitter"></i> <a href="https://x.com/faisal_durbaa" target="_blank">X (Twitter)</a></li>
                <li><i class="fab fa-instagram"></i> <a href="https://www.instagram.com/faisal_durbaa/" target="_blank">Instagram</a></li>
            </ul>
        </section>

        <section class="contact-form">
            <h2>Send a Message</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2024 Faisal Durbaa. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
